<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calc</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="atmosphere" aria-hidden="true"></div>
    <main class="app">
      <header class="brand">
        <p class="brand-name">Calc</p>
        <p class="brand-tagline">Basic arithmetic, nothing more.</p>
      </header>

      <section class="calculator" aria-label="Calculator">
        <div class="display" aria-live="polite">
          <span class="expression" id="expression"></span>
          <output class="value" id="display" for="keypad">0</output>
        </div>

        <div class="keypad" id="keypad" role="group" aria-label="Calculator keys">
          <button type="button" data-action="clear" class="key key-muted">AC</button>
          <button type="button" data-action="sign" class="key key-muted">±</button>
          <button type="button" data-action="percent" class="key key-muted">%</button>
          <button type="button" data-op="÷" class="key key-op">÷</button>

          <button type="button" data-digit="7" class="key">7</button>
          <button type="button" data-digit="8" class="key">8</button>
          <button type="button" data-digit="9" class="key">9</button>
          <button type="button" data-op="×" class="key key-op">×</button>

          <button type="button" data-digit="4" class="key">4</button>
          <button type="button" data-digit="5" class="key">5</button>
          <button type="button" data-digit="6" class="key">6</button>
          <button type="button" data-op="−" class="key key-op">−</button>

          <button type="button" data-digit="1" class="key">1</button>
          <button type="button" data-digit="2" class="key">2</button>
          <button type="button" data-digit="3" class="key">3</button>
          <button type="button" data-op="+" class="key key-op">+</button>

          <button type="button" data-digit="0" class="key key-zero">0</button>
          <button type="button" data-digit="." class="key">.</button>
          <button type="button" data-action="equals" class="key key-equals">=</button>
        </div>
      </section>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
